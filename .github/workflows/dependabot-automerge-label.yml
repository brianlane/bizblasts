name: Dependabot automerge label

# Tags Dependabot PRs that are eligible for auto-merge (all semver update types:
# patch, minor, and major). The actual merge is performed by
# dependabot-automerge.yml once every CI check is green. Split into two workflows
# because:
#   - This one needs write access to label, which requires pull_request_target
#     (Dependabot's pull_request token is read-only).
#   - The strict "all checks green" evaluation must run AFTER CI finishes, which
#     is handled via workflow_run in the companion file.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-dependabot:
    name: label-dependabot
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add or remove the automerge label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required: this job has no checkout, so gh can't infer the repo from a
          # git remote. Without GH_REPO, `gh label create` fails to resolve the
          # base repo (it was silently swallowed by `|| true`, so the label was
          # never created and labeling never worked).
          GH_REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        run: |
          set -euo pipefail

          # Ensure the label exists (idempotent).
          gh label create dependabot-automerge \
            --color 0e8a16 \
            --description "Dependabot PR eligible for strict auto-merge" \
            --force || true

          echo "Dependabot update type: ${UPDATE_TYPE:-<none>}"

          case "$UPDATE_TYPE" in
            "version-update:semver-patch"|"version-update:semver-minor"|"version-update:semver-major")
              echo "Semver update ($UPDATE_TYPE) -> marking eligible for auto-merge."
              gh pr edit "$PR_URL" --add-label "dependabot-automerge"
              ;;
            *)
              echo "Unknown/non-version update (${UPDATE_TYPE:-<none>}) -> NOT eligible for auto-merge."
              gh pr edit "$PR_URL" --remove-label "dependabot-automerge" || true
              ;;
          esac
