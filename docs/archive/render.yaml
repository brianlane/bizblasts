# ARCHIVED 2026-06: BizBlasts is now self-hosted on Ubuntu (Caddy + Puma via
# script/deploy.sh). This file is kept for historical reference only -- it
# documents how the app was deployed on Render.com when we were on the free
# tier (512 MB web dyno, Postgres free plan). It is NOT consumed by anything
# in the current deploy pipeline; do not edit unless you intend to redeploy
# to Render.
#
# Migration notes:
#   * `LOW_USAGE_MODE`, `RAILS_MAX_THREADS=1`, and `DB_POOL=2` were stripped
#     out in PR #450 once we left the free dyno.
#   * Current Ubuntu env vars live in /home/brianlane/apps/bizblasts/.env on
#     the server and are loaded by the systemd unit, not by this file.
#   * Deployment is triggered by the GitHub webhook at deploy.bizblasts.com
#     which runs script/deploy.sh.
#
# If you ever need to redeploy to Render: restore this file to the repo root
# (`git mv docs/archive/render.yaml render.yaml`) and re-enable the Render
# service in the Render dashboard.

services:
  - type: web
    name: bizblasts
    env: ruby
    # System packages required for Chrome/Chromium to run in headless mode
    packages:
      - libnss3
      - libatk-bridge2.0-0
      - libgbm1
      - libxkbcommon0
      - libgtk-3-0
      - libglib2.0-0
      - libasound2
      - libdrm2
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libcups2
      - libpango-1.0-0
      - libcairo2
      - fonts-liberation
      - unzip
      - ffmpeg
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /healthcheck
    domains:
      - bizblasts.com
      - "*.bizblasts.com"
    envVars:
      - key: PORT
        value: 10000
      - key: SECRET_KEY_BASE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bizblast-postgresql
          property: connectionString
      - key: DATABASE_HOST
        fromDatabase:
          name: bizblast-postgresql
          property: host  
      - key: DATABASE_PORT
        fromDatabase:
          name: bizblast-postgresql
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: bizblast-postgresql
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: bizblast-postgresql
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: bizblast-postgresql
          property: password
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RESEND_API_KEY
        sync: false
      - key: MAILER_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CUPRITE_BROWSER_PATH
        value: "/opt/render/project/src/vendor/chrome/chrome-linux64/chrome"

databases:
  - name: bizblast-postgresql
    plan: free